<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito Premium</title>
    <!-- Premium Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Alpine.js library -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- PayPal SDK (client-id=sb es para pruebas/sandbox, cámbialo por tu Client ID de producción) -->
    <!-- Se configura en USD ya que PayPal no soporta Soles Peruanos (PEN) nativamente -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
</head>
<body>
    <div class="cart-container" x-data="cartApp()" x-init="init()">
        <div class="cart-header">
            <h2>Tu Carrito de Compras</h2>
        </div>

        <div class="cart-items">
            <!-- Render dinámico con Alpine.js -->
            <template x-for="item in items" :key="item.id">
                <div class="cart-item">
                    <div class="item-info">
                        <strong x-text="item.name"></strong>
                        <span x-text="'Cantidad: ' + item.quantity"></span>
                    </div>
                    <!-- Mostramos en Soles en el Carrito local -->
                    <div class="item-price" x-text="'S/ ' + (item.price * item.quantity).toFixed(2)"></div>
                </div>
            </template>
        </div>

        <div class="cart-total">
            <div style="display: flex; flex-direction: column; width: 100%; gap: 4px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong>Total en Soles:</strong>
                    <span id="monto_total" x-text="'S/ ' + totalPEN.toFixed(2)"></span>
                </div>
                <!-- Mostramos la conversión estimada a USD para PayPal -->
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; color: var(--text-secondary);">
                    <span>Equivalente en Dólares (PayPal):</span>
                    <span x-text="'$' + totalUSD.toFixed(2) + ' USD'"></span>
                </div>
            </div>
        </div>

        <button @click="openPaymentModal()" class="btn-culqi" :disabled="items.length === 0">
            Confirmar compra
        </button>

        <!-- Modal de Métodos de Pago -->
        <div class="modal-overlay" :style="paymentModalOpen ? 'display: flex' : 'display: none'">
            <div class="modal-content" @click.away="paymentModalOpen = false">
                <span class="close-modal" @click="paymentModalOpen = false">&times;</span>

                <!-- Paso 1: Selección de Método -->
                <div x-show="paymentStep === 1">
                    <h3>Selecciona tu método de pago</h3>
                    <div class="payment-options">
                        <div class="payment-card" id="pay_yape" @click="selectMethod('yape')">
                            <div class="payment-icon">📱</div>
                            <span>Yape</span>
                        </div>
                        <div class="payment-card" id="pay_plin" @click="selectMethod('plin')">
                            <div class="payment-icon">📱</div>
                            <span>Plin</span>
                        </div>
                        <div class="payment-card" id="pay_paypal" @click="selectMethod('paypal')">
                            <div class="payment-icon">💳</div>
                            <span>PayPal</span>
                        </div>
                    </div>
                </div>

                <!-- Paso 2: Detalles de Pago Manual (Yape/Plin) -->
                <div x-show="paymentStep === 2">
                    <h3 :style="'color: ' + (manualPaymentDetails[paymentMethod]?.color || '#000000')" x-text="manualPaymentDetails[paymentMethod]?.title"></h3>
                    <div class="manual-payment-info">
                        <img :src="manualPaymentDetails[paymentMethod]?.qrUrl" alt="QR de Pago" class="qr-image" :style="'border-color: ' + (manualPaymentDetails[paymentMethod]?.color || '#e2e8f0')">
                        <div class="details">
                            <p><strong>Titular:</strong> <span x-text="manualPaymentDetails[paymentMethod]?.name"></span></p>
                            <p><strong>Celular:</strong> <span x-text="manualPaymentDetails[paymentMethod]?.phone"></span></p>
                            <p><strong>Monto a yapear:</strong> <span x-text="'S/ ' + totalPEN.toFixed(2)"></span></p>
                        </div>
                    </div>
                    <div class="voucher-section">
                        <label for="voucher_upload">Adjunta tu ticket/voucher de pago:</label>
                        <input type="file" id="voucher_upload" @change="voucherFile = $event.target.files[0]" accept="image/*,application/pdf" class="file-input">
                    </div>
                    <button @click="submitManualPayment()" class="btn-culqi" style="margin-top: 15px;">
                        Confirmar y enviar comprobante
                    </button>
                    <button @click="paymentStep = 1" class="btn-secondary">Volver atrás</button>
                </div>

                <!-- Paso 3: Integración de PayPal -->
                <div x-show="paymentStep === 3">
                    <h3>Pagar con PayPal</h3>
                    <p style="text-align: center; margin-bottom: 20px; font-size: 0.95rem; color: var(--text-secondary);">
                        Vas a realizar el pago de <strong style="color: var(--text-primary);" x-text="'$' + totalUSD.toFixed(2) + ' USD'"></strong> correspondiente a tu compra.
                    </p>
                    
                    <!-- Contenedor donde PayPal inyectará los botones oficiales -->
                    <div id="paypal-button-container" style="min-height: 150px; margin-top: 10px;"></div>
                    
                    <button @click="paymentStep = 1" class="btn-secondary" style="margin-top: 15px;">Volver atrás</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function cartApp() {
            return {
                // Estado del carrito (puedes añadir o modificar productos aquí)
                items: [
                    { id: 1, name: 'Camiseta de Algodón', price: 50.00, quantity: 2 },
                    { id: 2, name: 'Taza Personalizada', price: 50.00, quantity: 1 }
                ],
                paymentModalOpen: false,
                paymentStep: 1,
                paymentMethod: '',
                voucherFile: null,
                
                // Tipo de cambio estimado S/ a USD (1 USD = 3.80 Soles)
                // Modifica este valor de acuerdo al tipo de cambio deseado
                tipoCambio: 3.80, 

                manualPaymentDetails: {
                    yape: {
                        title: 'Pago con Yape',
                        qrUrl: 'https://via.placeholder.com/200x200/7400b8/ffffff?text=QR+Yape', // Remplaza con tu QR real
                        color: '#7400b8',
                        name: 'Tu Nombre Apellido',
                        phone: '999 999 999'
                    },
                    plin: {
                        title: 'Pago con Plin',
                        qrUrl: 'https://via.placeholder.com/200x200/00c8b0/ffffff?text=QR+Plin', // Remplaza con tu QR real
                        color: '#00c8b0',
                        name: 'Tu Nombre Apellido',
                        phone: '999 999 999'
                    }
                },

                get totalPEN() {
                    return this.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                },

                get totalUSD() {
                    // Conversión de Soles a Dólares
                    return parseFloat((this.totalPEN / this.tipoCambio).toFixed(2));
                },

                init() {
                    // Renderizamos los botones de PayPal una sola vez
                    this.renderPayPalButtons();
                },

                openPaymentModal() {
                    this.paymentStep = 1;
                    this.paymentModalOpen = true;
                    this.voucherFile = null;
                },

                selectMethod(method) {
                    this.paymentMethod = method;
                    if (method === 'paypal') {
                        this.paymentStep = 3;
                    } else {
                        this.paymentStep = 2;
                    }
                },

                submitManualPayment() {
                    if (!this.voucherFile) {
                        alert('Por favor, adjunta tu ticket o voucher de pago para continuar.');
                        return;
                    }
                    
                    alert('¡Comprobante enviado exitosamente! Validaremos tu pago en breve.');
                    this.paymentModalOpen = false;
                    this.items = []; // Vaciar carrito después de confirmar
                },

                renderPayPalButtons() {
                    // Verificamos que el SDK de PayPal se haya cargado correctamente
                    if (typeof paypal === 'undefined') {
                        console.error('El SDK de PayPal no pudo cargarse.');
                        return;
                    }

                    const self = this;
                    paypal.Buttons({
                        // Se llama al dar clic en el botón de PayPal
                        createOrder: function(data, actions) {
                            return actions.order.create({
                                purchase_units: [{
                                    amount: {
                                        currency_code: 'USD',
                                        value: self.totalUSD.toString() // Monto total en dólares convertidos
                                    },
                                    description: 'Compra en Carrito Premium'
                                }]
                            });
                        },
                        // Se ejecuta al completarse la autenticación y validación del pago del cliente
                        onApprove: function(data, actions) {
                            return actions.order.capture().then(function(details) {
                                // Pago aprobado exitosamente en el cliente
                                alert('¡Pago realizado con éxito por PayPal! Gracias por tu compra, ' + details.payer.name.given_name + '.');
                                console.log('Detalles de transacción:', details);
                                
                                self.paymentModalOpen = false;
                                self.items = []; // Vaciar carrito tras la compra
                            });
                        },
                        // Si ocurre un error en la pasarela de PayPal
                        onError: function(err) {
                            console.error('Error en pasarela PayPal:', err);
                            alert('Hubo un problema procesando el pago con PayPal. Intente nuevamente.');
                        }
                    }).render('#paypal-button-container');
                }
            }
        }
    </script>
</body>
</html>
