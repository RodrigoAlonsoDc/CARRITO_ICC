<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito Premium</title>
    <!-- Premium Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Alpine.js library -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Culqui Checkout SDK -->
    <script src="https://checkout.culqui.com/js/v4"></script>
</head>
<body>
    <div class="cart-container" x-data="cartApp()" x-init="init()">
        <div class="cart-header">
            <h2>Tu Carrito de Compras</h2>
        </div>

        <div class="cart-items">
            <!-- Render dinámico con Alpine.js -->
            <template x-for="item in items" :key="item.id">
                <div class="cart-item">
                    <div class="item-info">
                        <strong x-text="item.name"></strong>
                        <span x-text="'Cantidad: ' + item.quantity"></span>
                    </div>
                    <div class="item-price" x-text="'S/ ' + (item.price * item.quantity).toFixed(2)"></div>
                </div>
            </template>
        </div>

        <div class="cart-total">
            <strong>Total a Pagar: <span id="monto_total" x-text="'S/ ' + total.toFixed(2)"></span></strong>
        </div>

        <button @click="openPaymentModal()" class="btn-culqi" :disabled="items.length === 0">
            Confirmar compra
        </button>

        <!-- Modal de Métodos de Pago -->
        <div class="modal-overlay" :style="paymentModalOpen ? 'display: flex' : 'display: none'">
            <div class="modal-content" @click.away="paymentModalOpen = false">
                <span class="close-modal" @click="paymentModalOpen = false">&times;</span>

                <!-- Paso 1: Selección de Método -->
                <div x-show="paymentStep === 1">
                    <h3>Selecciona tu método de pago</h3>
                    <div class="payment-options">
                        <div class="payment-card" id="pay_yape" @click="selectMethod('yape')">
                            <div class="payment-icon">📱</div>
                            <span>Yape</span>
                        </div>
                        <div class="payment-card" id="pay_plin" @click="selectMethod('plin')">
                            <div class="payment-icon">📱</div>
                            <span>Plin</span>
                        </div>
                        <div class="payment-card" id="pay_tarjeta" @click="selectMethod('tarjeta')">
                            <div class="payment-icon">💳</div>
                            <span>Tarjeta</span>
                        </div>
                    </div>
                </div>

                <!-- Paso 2: Detalles de Pago Manual (Yape/Plin) -->
                <div x-show="paymentStep === 2">
                    <h3 :style="'color: ' + (manualPaymentDetails[paymentMethod]?.color || '#000000')" x-text="manualPaymentDetails[paymentMethod]?.title"></h3>
                    <div class="manual-payment-info">
                        <img :src="manualPaymentDetails[paymentMethod]?.qrUrl" alt="QR de Pago" class="qr-image" :style="'border-color: ' + (manualPaymentDetails[paymentMethod]?.color || '#e2e8f0')">
                        <div class="details">
                            <p><strong>Titular:</strong> <span x-text="manualPaymentDetails[paymentMethod]?.name"></span></p>
                            <p><strong>Celular:</strong> <span x-text="manualPaymentDetails[paymentMethod]?.phone"></span></p>
                            <p><strong>Monto:</strong> <span x-text="'S/ ' + total.toFixed(2)"></span></p>
                        </div>
                    </div>
                    <div class="voucher-section">
                        <label for="voucher_upload">Adjunta tu ticket/voucher de pago:</label>
                        <input type="file" id="voucher_upload" @change="voucherFile = $event.target.files[0]" accept="image/*,application/pdf" class="file-input">
                    </div>
                    <button @click="submitManualPayment()" class="btn-culqi" style="margin-top: 15px;">
                        Confirmar y enviar comprobante
                    </button>
                    <button @click="paymentStep = 1" class="btn-secondary">Volver atrás</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function cartApp() {
            return {
                // Estado del carrito (puedes añadir o modificar productos aquí)
                items: [
                    { id: 1, name: 'Camiseta de Algodón', price: 50.00, quantity: 2 },
                    { id: 2, name: 'Taza Personalizada', price: 50.00, quantity: 1 }
                ],
                paymentModalOpen: false,
                paymentStep: 1,
                paymentMethod: '',
                voucherFile: null,
                
                // Llaves de Culqui
                // REEMPLAZAR CON TU LLAVE PÚBLICA DE CULQUI (Prueba: pk_test_... o Producción: pk_live_...)
                culquiPublicKey: 'pk_test_xxxxxxxxxxxxxxxxx', 
                
                manualPaymentDetails: {
                    yape: {
                        title: 'Pago con Yape',
                        qrUrl: 'https://via.placeholder.com/200x200/7400b8/ffffff?text=QR+Yape', // Remplaza con tu QR real
                        color: '#7400b8',
                        name: 'Tu Nombre Apellido',
                        phone: '999 999 999'
                    },
                    plin: {
                        title: 'Pago con Plin',
                        qrUrl: 'https://via.placeholder.com/200x200/00c8b0/ffffff?text=QR+Plin', // Remplaza con tu QR real
                        color: '#00c8b0',
                        name: 'Tu Nombre Apellido',
                        phone: '999 999 999'
                    }
                },

                get total() {
                    return this.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                },

                get totalCents() {
                    return Math.round(this.total * 100);
                },

                init() {
                    // Configurar llave pública de Culqui
                    Culqi.publicKey = this.culquiPublicKey;
                },

                openPaymentModal() {
                    this.paymentStep = 1;
                    this.paymentModalOpen = true;
                    this.voucherFile = null;
                },

                selectMethod(method) {
                    this.paymentMethod = method;
                    if (method === 'tarjeta') {
                        this.paymentModalOpen = false;
                        
                        // Configurar el formulario Checkout de Culqui
                        Culqi.settings({
                            title: 'Mi Tienda Virtual',
                            currency: 'PEN',
                            amount: this.totalCents
                        });
                        
                        // Abrir pasarela de pago Culqui
                        Culqi.open();
                    } else {
                        this.paymentStep = 2;
                    }
                },

                submitManualPayment() {
                    if (!this.voucherFile) {
                        alert('Por favor, adjunta tu ticket o voucher de pago para continuar.');
                        return;
                    }
                    
                    // Simulación del envío de comprobante de pago
                    alert('¡Comprobante enviado exitosamente! Validaremos tu pago en breve.');
                    this.paymentModalOpen = false;
                    this.items = []; // Vaciar carrito después de confirmar
                }
            }
        }

        // Función Callback global que llama Culqui al terminar la operación con tarjeta
        function culqi() {
            if (Culqi.token) {
                // Token seguro generado con éxito
                const token = Culqi.token.id;
                const email = Culqi.token.email;
                
                // Obtener acceso al contexto de Alpine.js en la página
                const cartContainer = document.querySelector('[x-data]');
                const app = Alpine.$data(cartContainer);
                
                console.log("Token de pago Culqui creado: ", token);
                alert("Procesando pago con tarjeta... Por favor, no cierres la ventana.");

                // Enviar el token y el monto al backend PHP para procesar el cobro real
                fetch('process_payment.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        amount: app.totalCents,
                        email: email
                    })
                })
                .then(res => res.json())
                .then(response => {
                    if (response.success) {
                        alert('¡Pago completado exitosamente! ID de la transacción: ' + response.data.id);
                        app.items = []; // Vaciar carrito tras el pago exitoso
                    } else {
                        alert('Error al procesar el cobro: ' + response.error.user_message);
                    }
                })
                .catch(err => {
                    console.error('Error de conexión:', err);
                    alert('Hubo un error al conectar con el servidor de pagos.');
                });
            } else {
                // Error devuelto por Culqui (tarjeta rechazada, campos inválidos, etc.)
                console.error(Culqi.error);
                alert(Culqi.error.user_message || 'El pago con tarjeta no pudo ser procesado.');
            }
        }
    </script>
</body>
</html>
